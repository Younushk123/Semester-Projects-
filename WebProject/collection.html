<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Books Display</title>
  <style>
     body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f4;
    } 
    nav{
  /* position: fixed;   */
  background: #10355f ;
  width: 100%;
  padding: 10px 0;
  z-index: 12;
}
nav .menu{
  max-width: 1250px;
  margin:auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;  
}
.menu .logo a{
  text-align: left;
  text-decoration: none;
  color: #fff;
  font-size: 30px;
  font-weight: 700;
  /* margin-right: 17px; */

}
.menu ul{
  display: inline-flex;
}
.menu ul li{
  list-style: none;
  margin-left: 7px;
  text-align: justify;
}
.menu ul li a{
  text-decoration: none;
  color: #fff;
  font-size: 20px;
  font-weight: 500;
  /* background: rgb(236, 158, 69); */
  background-size: 10px;
  padding: 5px 10px;
  border-radius: 10px;
  transition: all 0.3s ease;
}
.menu ul li a:hover{
  background: #fff;
  color: #000 ;
}
    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #333;
    }

    .book-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .book-card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 250px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .book-card:hover {
      transform: scale(1.03);
    }

    .book-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .book-info {
      padding: 15px;
      text-align: center;
    }

    .book-info h2 {
      font-size: 18px;
      margin: 10px 0 5px;
      color: #222;
    }

    .book-info p {
      color: #666;
      font-size: 14px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #eee;
      color: #666;
      margin-top: 50px;
      font-size: 14px;
    }
  </style>
</head>
<body>
    <nav>
    <div class ="menu">
      <div class ="logo">
        <a href="#">📚 BookBuddy</a>
      </div>
      <ul>
        <li><a href="index.html" class="active">Home</a></li> 
        <li><a href="about.html">About</a></li>

        <li><a href="contact.html">Contact</a></li>
        <!-- <li><a href="#">Categories</a></li> -->
        <li><a href="feedback.html">FeedBack</a></li>
        <!-- <li><a href="#">🌙Dark Mode</a></li> -->



      </ul>
        <!-- <button style="text-align: left;" id="dark-mode-toggle">🌙 Dark Mode</button> -->


    </div>


  </nav>

  <h1>📚 Our Book Collection</h1>

  <div class="book-container">

    <div class="book-card">
      <img src="deep-work.jpg" alt="Book Title Page">
      <div class="book-info">
        <h2>Deep Work</h2>
        <p>by Cal Newport</p>
      </div>
    </div>

    <div class="book-card">
      <img src="atomic-habits.jpg.jpg" alt="Book Title Page">
      <div class="book-info">
        <h2>Atomic Habits</h2>
        <p>by James Clear</p>
      </div>
    </div>

    <div class="book-card">
      <img src="harry.jpg" alt="Book Title Page">
      <div class="book-info">
        <h2>Harry Potter</h2>
        <p>by J.K. Rowling</p>
      </div>
    </div>

  </div>
<footer>
    &copy; 2025 Your Book Store. All rights reserved.
  </footer>
</body>
</html>
